name: Enrich & Scan Skills

on:
  workflow_dispatch:
    inputs:
      enrich:
        description: 'Run AI enrichment (requires Copilot CLI)'
        type: boolean
        default: false
      force:
        description: 'Re-enrich already-enriched skills'
        type: boolean
        default: false
      limit:
        description: 'Max skills to enrich (0 = all pending)'
        type: string
        default: '10'
  push:
    branches: [main]
    paths:
      - 'site/src/data/skills.json'
      - 'skills/security-rules.yml'
      - 'scripts/scan-skills.js'
      - 'scripts/enrich-skills.js'

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      high-issues: ${{ steps.scan.outputs.high-issues }}
      verified-count: ${{ steps.scan.outputs.verified-count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security scan
        id: scan
        run: |
          node scripts/scan-skills.js \
            --output scan-report.json \
            --update-skills

          # Extract summary from report
          HIGH=$(node -e "const r=require('./scan-report.json'); console.log(r.summary.high)")
          VERIFIED=$(node -e "const r=require('./scan-report.json'); console.log(r.summary.verified)")

          echo "high-issues=$HIGH" >> $GITHUB_OUTPUT
          echo "verified-count=$VERIFIED" >> $GITHUB_OUTPUT

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: scan-report.json
          retention-days: 30

      - name: Commit updated skills.json
        # Only commit scan results when run manually; on push, the report is
        # available as an artifact to avoid bypassing PR review for data changes.
        if: github.event_name == 'workflow_dispatch'
        id: scan-commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/data/skills.json
          if git diff --cached --quiet; then
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update security scan results in skills.json"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy after scan
        if: steps.scan-commit.outputs.pushed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post scan summary
        run: |
          echo "## 🔐 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "
            const r = require('./scan-report.json');
            const lines = [
              '| Metric | Count |',
              '|--------|-------|',
              \`| ✅ Verified skills | \${r.summary.verified} / \${r.totalSkills} |\`,
              \`| 🔴 High severity issues | \${r.summary.high} |\`,
              \`| 🟡 Medium severity issues | \${r.summary.medium} |\`,
              \`| ⚠️ Skills with findings | \${r.findings.length} |\`,
            ];
            console.log(lines.join('\n'));
            if (r.findings.length > 0) {
              console.log('');
              console.log('### Skills with findings');
              r.findings.slice(0, 20).forEach(f => {
                const sev = f.issues.map(i => i.severity).join(', ');
                console.log(\`- **\${f.skillId}**: \${f.issueCount} issue(s) [\${sev}]\`);
              });
            }
          " >> $GITHUB_STEP_SUMMARY

  enrich:
    name: AI Enrichment
    runs-on: ubuntu-latest
    needs: scan
    # Only run enrichment when explicitly requested via workflow_dispatch
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.enrich == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install GitHub Copilot CLI extension
        run: |
          gh extension install github/gh-copilot 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run enrichment
        id: enrich
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            FORCE_FLAG="--force"
          fi
          LIMIT="${{ github.event.inputs.limit }}"
          node scripts/enrich-skills.js $FORCE_FLAG --limit "$LIMIT" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit enrichment results
        id: enrich-commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/data/skills.json
          if git diff --cached --quiet; then
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: enrich skill metadata via Copilot SDK"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy after enrichment
        if: steps.enrich-commit.outputs.pushed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enrichment summary
        run: |
          echo "## 🤖 AI Enrichment Results" >> $GITHUB_STEP_SUMMARY
          ENRICHED=$(node -e "const d=require('./site/src/data/skills.json'); console.log(d.skills.filter(s=>s.enrichedAt).length)")
          TOTAL=$(node -e "const d=require('./site/src/data/skills.json'); console.log(d.skills.length)")
          echo "- **Total skills:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Enriched skills:** $ENRICHED" >> $GITHUB_STEP_SUMMARY
